<style>
  .kb-form-container {
    max-width: 800px;
    margin: 40px auto;
    padding: 30px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .kb-form-header {
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid #f0f0f0;
  }

  .kb-form-header h2 {
    color: #2c3e50;
    font-size: 28px;
    margin: 0;
    font-weight: 600;
  }

  .form-group {
    margin-bottom: 25px;
  }

  .form-group label {
    display: block;
    margin-bottom: 8px;
    color: #555;
    font-weight: 500;
    font-size: 14px;
  }

  .form-control {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    transition:
      border-color 0.3s,
      box-shadow 0.3s;
    resize: vertical;
  }

  .form-control:focus {
    outline: none;
    border-color: #3498db;
    box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
  }

  .checkbox-wrapper {
    display: flex;
    align-items: center;
    padding: 15px;
    background: #f8f9fa;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .checkbox-wrapper:hover {
    background: #e9ecef;
  }

  .checkbox-wrapper input[type="checkbox"] {
    width: 20px;
    height: 20px;
    margin-right: 10px;
    cursor: pointer;
  }

  .checkbox-wrapper label {
    margin: 0;
    cursor: pointer;
    color: #333;
    font-size: 15px;
  }

  .form-actions {
    display: flex;
    gap: 12px;
    margin-top: 30px;
    padding-top: 20px;
    border-top: 2px solid #f0f0f0;
  }

  .btn {
    padding: 12px 30px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
    display: inline-block;
  }

  .btn-primary {
    background: #3498db;
    color: white;
  }

  .btn-primary:hover {
    background: #2980b9;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
  }

  .btn-secondary {
    background: #95a5a6;
    color: white;
  }

  .btn-secondary:hover {
    background: #7f8c8d;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(149, 165, 166, 0.3);
  }

  .mode-badge {
    display: inline-block;
    padding: 6px 14px;
    margin-bottom: 10px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }

  .mode-create {
    background: #e8f6ff;
    color: #1e88e5;
    border: 1px solid #90caf9;
  }

  .mode-edit {
    background: #fff4e5;
    color: #e67e22;
    border: 1px solid #f5cba7;
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255, 255, 255, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 99999;
  }

  .loading-box {
    text-align: center;
    background: #fff;
    padding: 30px 40px;
    border-radius: 14px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
  }

  .loading-box p {
    margin-top: 15px;
    color: #333;
    font-size: 15px;
  }

  .spinner {
    width: 42px;
    height: 42px;
    border: 4px solid #e0e0e0;
    border-top: 4px solid #3498db;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }
</style>

<div class="kb-form-container">
  <div class="kb-form-header">
    {% if mode == 'create' %}
    <span class="mode-badge mode-create">โหมดเพิ่มข้อมูล</span>
    <h2>เพิ่มข้อมูลความรู้</h2>
    {% else %}
    <span class="mode-badge mode-edit">โหมดแก้ไขข้อมูล</span>
    <h2>แก้ไขข้อมูลความรู้</h2>
    {% endif %}
  </div>

  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <label for="content">เนื้อหา</label>
      <textarea
        id="content"
        name="content"
        rows="10"
        class="form-control"
        placeholder="กรอกเนื้อหาความรู้ที่นี่..."
        required
      >
{% if doc %}{{ doc.content }}{% endif %}</textarea
      >
    </div>

    <div class="form-group">
      <div class="checkbox-wrapper">
        {% if mode == 'create' %}
        <input type="checkbox" id="is_active" name="is_active" checked />
        {% else %}
        <input
          type="checkbox"
          id="is_active"
          name="is_active"
          {%
          if
          doc.is_active
          %}checked{%
          endif
          %}
        />
        {% endif %}
        <label for="is_active">เปิดใช้งาน</label>
      </div>
    </div>

    <div class="form-actions">
      <button
        type="submit"
        class="btn {% if mode == 'create' %}btn-primary{% else %}btn-secondary{% endif %}"
      >
        {% if mode == 'create' %}เพิ่มข้อมูล{% else %}บันทึกการแก้ไข{% endif %}
      </button>

      <a href="{% url 'kb_list' %}" class="btn btn-secondary"> กลับ </a>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
      <div class="loading-box">
        <div class="spinner"></div>
        <p>กำลังเพิ่มข้อมูล กรุณารอสักครู่...</p>
      </div>
    </div>
  </form>
</div>

<script>
  const form = document.querySelector("form");
  const overlay = document.getElementById("loadingOverlay");

  form.addEventListener("submit", function () {
    overlay.style.display = "flex";

    const submitBtn = form.querySelector("button[type='submit']");
    submitBtn.disabled = true;
    submitBtn.innerText = "กำลังบันทึก...";
  });
</script>
